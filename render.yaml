services:
  # Backend FastAPI Service
  - type: web
    name: shopzone-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres:Tharun@1804@db.seighjspoashzrjnzmmp.supabase.co:5432/postgres"
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend React Static Site
  - type: web
      runtime: static
    name: shopzone-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://shopzone-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

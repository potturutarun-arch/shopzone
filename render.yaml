services:
- type: web
  name: shopzone-backend
  runtime: python
  plan: free
  buildCommand: pip install -r backend/requirements.txt
  startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
  envVars:
    - key: DATABASE_URL
      value: "postgresql://postgres:Tharun%401804@db.seighjspoashzrjnzmmp.supabase.co:5432/postgres"
    - key: PYTHON_VERSION
      value: 3.11.0

- type: web
  name: shopzone-frontend
  runtime: static
  buildCommand: npm install && npm run build
  staticPublishPath: dist
  envVars:
    - key: VITE_API_BASE_URL
      value: "https://shopzone-backend.onrender.com"
  routes:
    - type: rewrite
      source: /*
      destination: /index.html
